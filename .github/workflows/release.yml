name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-release:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            name: "Apple Silicon"
          - os: macos-12
            arch: x86_64
            name: "Intel"

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true

    - name: Install CocoaPods
      run: |
        gem install cocoapods
        pod repo update

    - name: Install Dependencies
      run: pod install

    - name: Build MacDown Release (${{ matrix.name }})
      run: |
        set -o pipefail
        xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Release \
          -derivedDataPath build-${{ matrix.arch }} \
          ARCHS=${{ matrix.arch }} \
          build | xcpretty

    - name: Create Disk Image (${{ matrix.name }})
      run: |
        mkdir -p dist-${{ matrix.arch }}
        cp -r build-${{ matrix.arch }}/Build/Products/Release/MacDown.app dist-${{ matrix.arch }}/MacDown.app

        hdiutil create -volname "MacDown" \
          -srcfolder dist-${{ matrix.arch }} \
          -ov -format UDZO \
          "MacDown-${{ github.ref_name }}-${{ matrix.arch }}.dmg"

    - name: Upload DMG as Artifact
      uses: actions/upload-artifact@v3
      with:
        name: MacDown-${{ matrix.arch }}-dmg
        path: MacDown-${{ github.ref_name }}-${{ matrix.arch }}.dmg

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest

    steps:
    - name: Download All Artifacts
      uses: actions/download-artifact@v3

    - name: List Artifacts
      run: find . -type f -name "*.dmg"

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          MacDown-*-dmg/*.dmg
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
