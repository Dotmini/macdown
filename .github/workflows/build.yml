name: Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            name: "Apple Silicon"
          - os: macos-13  # Changed from macos-12 (faster, more available)
            arch: x86_64
            name: "Intel"

    timeout-minutes: 60
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true

    - name: Cache CocoaPods
      uses: actions/cache@v3
      with:
        path: Pods
        key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Install CocoaPods and xcpretty
      run: |
        gem install cocoapods xcpretty
        pod repo update --silent

    - name: Install Dependencies
      run: |
        if [ ! -d "Pods" ]; then
          pod install --repo-update
        else
          echo "Using cached Pods"
        fi

    - name: Build MacDown (${{ matrix.name }})
      run: |
        set -o pipefail
        xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Release \
          -derivedDataPath build-${{ matrix.arch }} \
          ARCHS=${{ matrix.arch }} \
          VALID_ARCHS=${{ matrix.arch }} \
          build 2>&1 | xcpretty || xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Release \
          -derivedDataPath build-${{ matrix.arch }} \
          ARCHS=${{ matrix.arch }} \
          VALID_ARCHS=${{ matrix.arch }} \
          build

    - name: Run Tests (${{ matrix.name }})
      run: |
        set -o pipefail
        xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Debug \
          test 2>&1 | xcpretty || xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Debug \
          test

    - name: Upload Build Artifacts (${{ matrix.name }})
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MacDown-${{ matrix.arch }}
        path: build-${{ matrix.arch }}
        retention-days: 30
