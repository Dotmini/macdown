name: Build

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-14
            arch: arm64
            name: "Apple Silicon"
          - os: macos-12
            arch: x86_64
            name: "Intel"

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true

    - name: Install CocoaPods
      run: |
        gem install cocoapods
        pod repo update

    - name: Install Dependencies
      run: pod install

    - name: Build MacDown (${{ matrix.name }})
      run: |
        set -o pipefail
        xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Release \
          -derivedDataPath build-${{ matrix.arch }} \
          ARCHS=${{ matrix.arch }} \
          build | xcpretty

    - name: Run Tests (${{ matrix.name }})
      run: |
        set -o pipefail
        xcodebuild -workspace MacDown.xcworkspace \
          -scheme MacDown \
          -configuration Debug \
          test | xcpretty

    - name: Upload Build Artifacts (${{ matrix.name }})
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: MacDown-${{ matrix.arch }}
        path: build-${{ matrix.arch }}
        retention-days: 30
